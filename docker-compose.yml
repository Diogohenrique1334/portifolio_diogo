services:
  portfolio:
    build: .
    image: portfolio-diogo:latest
    container_name: portfolio-diogo
    ports:
      - "8501:8501"
    # Variáveis de ambiente (ex.: PORTFOLIO_ADMIN_PASSWORD).
    # Copie .env.example para .env antes de subir.
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8501/_stcore/health').status==200 else sys.exit(1)"
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
